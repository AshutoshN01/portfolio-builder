<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com https://firebasestorage.googleapis.com https://*.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formspree.io https://*.sentry.io https://*.google-analytics.com https://*.analytics.google.com https://*.googleapis.com https://*.firebaseapp.com https://*.firebaseio.com wss://*.firebaseio.com localhost:* 127.0.0.1:* ws://localhost:* ws://127.0.0.1:*;"
    />

    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font Loading: Syne (display) + Inter (body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#050505" />

    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="Portfolio of Ashutosh showcasing React development, Android mobile apps, and Firebase integrations." />
    <meta name="author" content="Ashutosh" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ashutosh — Software Developer" />
    <meta property="og:description" content="Portfolio of Ashutosh showcasing React development, Android mobile apps, and Firebase integrations." />
    <meta property="og:image" content="/assets/og-image.webp" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ashutosh — Software Developer" />
    <meta name="twitter:description" content="Portfolio of Ashutosh showcasing React development, Android mobile apps, and Firebase integrations." />
    <meta name="twitter:image" content="/assets/og-image.webp" />

    <!-- Favicon & PWA Assets -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Ashutosh — Software Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
